<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aldo López</title>
    <style>
        /* Locked layout with dvh for mobile browser accuracy */
        body { 
            background-color: #008080; 
            margin: 0;
            padding: 0;
            overflow: hidden; 
            height: 100dvh; 
            width: 100vw;
            font-family: "Courier New", Courier, monospace; 
        }

        /* Main content box */
        main { 
            background-color: #c0c0c0; 
            color: #000000; 
            border: 4px outset #ffffff; 
            padding: 20px; 
            max-width: 600px; 
            margin: 50px auto; 
        }

        /* Smooth CSS Marquee */
        .marquee-container { 
            background-color: #000000; 
            color: #00ff00; 
            padding: 5px; 
            margin-bottom: 20px; 
            border: 1px inset #ffffff;
            overflow: hidden;
            width: 100%;
            box-sizing: border-box;
        }

        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: scroll-left 15s linear infinite;
        }

        @keyframes scroll-left {
            0%   { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* Easter Egg perfectly aligned to the outer edge */
        #easter-egg {
            position: absolute;
            top: 0;
            left: 0;
            margin: 0;
            width: 24px;
            height: 24px;
            line-height: 24px;
            text-align: center;
            cursor: pointer;
            text-decoration: underline;
            color: #ffff00;
            font-weight: bold;
            font-size: 18px;
            white-space: nowrap;
            animation: moveAround 10s linear infinite;
            z-index: 9999; 
        }

        /* Continuous coordinate-accurate animation */
        @keyframes moveAround {
            0%   { top: 0; left: 0; }
            25%  { top: 0; left: calc(100vw - 24px); }
            50%  { top: calc(100dvh - 24px); left: calc(100vw - 24px); }
            75%  { top: calc(100dvh - 24px); left: 0; }
            100% { top: 0; left: 0; }
        }
        
        /* Game Canvas styling */
        #game { background: #000; display: block; margin: 20px auto; border: 2px inset #fff; }
    </style>
</head>
<body>

    <main>
        <div class="marquee-container">
            <div class="marquee-content">System Online... Aldo López... Staff Software Engineer...</div>
        </div>

        <h1>Aldo López</h1>
        <p>Building things, one byte at a time.</p>
        
        <ul>
            <li><a href="https://github.com/aldolopez" target="_blank">GitHub</a></li>
            <li><a href="https://linkedin.com/in/aldolopez" target="_blank">LinkedIn</a></li>
        </ul>

        <div id="game-wrapper"></div>
        <hr>
        <p><small>Site constructed with pure HTML5/JS.</small></p>
    </main>

    <p id="easter-egg">0</p>

    <script>
        document.getElementById('easter-egg').addEventListener('click', function() {
            // Prevent multiple canvases if clicked repeatedly
            if (document.getElementById('game')) return;

            const wrapper = document.getElementById('game-wrapper');
            const canvas = document.createElement('canvas');
            canvas.id = 'game';
            canvas.width = 400;
            canvas.height = 400;
            wrapper.appendChild(canvas);

            var context = canvas.getContext('2d');

            // the canvas width & height, snake x & y, and the apple x & y, all need to be a multiples of the grid size in order for collision detection to work
            // (e.g. 16 * 25 = 400)
            var grid = 16;
            var count = 0;

            var snake = {
              x: 160,
              y: 160,

              // snake velocity. moves one grid length every frame in either the x or y direction
              dx: grid,
              dy: 0,

              // keep track of all grids the snake body occupies
              cells: [],

              // length of the snake. grows when eating an apple
              maxCells: 4
            };
            var apple = {
              x: 320,
              y: 320
            };

            // get random whole numbers in a specific range
            // @see https://stackoverflow.com/a/1527820/2124254
            function getRandomInt(min, max) {
              return Math.floor(Math.random() * (max - min)) + min;
            }

            // game loop
            function loop() {
              requestAnimationFrame(loop);

              // slow game loop to 15 fps instead of 60 (60/15 = 4)
              if (++count < 4) {
                return;
              }

              count = 0;
              context.clearRect(0,0,canvas.width,canvas.height);

              // move snake by it's velocity
              snake.x += snake.dx;
              snake.y += snake.dy;

              // wrap snake position horizontally on edge of screen
              if (snake.x < 0) {
                snake.x = canvas.width - grid;
              }
              else if (snake.x >= canvas.width) {
                snake.x = 0;
              }

              // wrap snake position vertically on edge of screen
              if (snake.y < 0) {
                snake.y = canvas.height - grid;
              }
              else if (snake.y >= canvas.height) {
                snake.y = 0;
              }

              // keep track of where snake has been. front of the array is always the head
              snake.cells.unshift({x: snake.x, y: snake.y});

              // remove cells as we move away from them
              if (snake.cells.length > snake.maxCells) {
                snake.cells.pop();
              }

              // draw apple
              context.fillStyle = 'red';
              context.fillRect(apple.x, apple.y, grid-1, grid-1);

              // draw snake one cell at a time
              context.fillStyle = 'green';
              snake.cells.forEach(function(cell, index) {

                // drawing 1 px smaller than the grid creates a grid effect in the snake body so you can see how long it is
                context.fillRect(cell.x, cell.y, grid-1, grid-1);

                // snake ate apple
                if (cell.x === apple.x && cell.y === apple.y) {
                  snake.maxCells++;

                  // canvas is 400x400 which is 25x25 grids
                  apple.x = getRandomInt(0, 25) * grid;
                  apple.y = getRandomInt(0, 25) * grid;
                }

                // check collision with all cells after this one (modified bubble sort)
                for (var i = index + 1; i < snake.cells.length; i++) {

                  // snake occupies same space as a body part. reset game
                  if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                    snake.x = 160;
                    snake.y = 160;
                    snake.cells = [];
                    snake.maxCells = 4;
                    snake.dx = grid;
                    snake.dy = 0;

                    apple.x = getRandomInt(0, 25) * grid;
                    apple.y = getRandomInt(0, 25) * grid;
                  }
                }
              });
            }

            // listen to keyboard events to move the snake
            document.addEventListener('keydown', function(e) {
              // left arrow key
              if (e.which === 37 && snake.dx === 0) {
                snake.dx = -grid;
                snake.dy = 0;
              }
              // up arrow key
              else if (e.which === 38 && snake.dy === 0) {
                snake.dy = -grid;
                snake.dx = 0;
              }
              // right arrow key
              else if (e.which === 39 && snake.dx === 0) {
                snake.dx = grid;
                snake.dy = 0;
              }
              // down arrow key
              else if (e.which === 40 && snake.dy === 0) {
                snake.dy = grid;
                snake.dx = 0;
              }
            });

            // start the game
            requestAnimationFrame(loop);
        });
    </script>
</body>
</html>
