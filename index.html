<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Aldo López</title>
    <style>
        /* Locked layout: zero margin/padding ensures perfect coordinate tracking */
        body { 
            background-color: #008080; 
            margin: 0;
            padding: 0;
            overflow: hidden; 
            height: 100dvh; 
            width: 100vw;
            font-family: "Courier New", Courier, monospace; 
        }

        /* Main content box */
        main { 
            background-color: #c0c0c0; 
            color: #000000; 
            border: 4px outset #ffffff; 
            padding: 20px; 
            max-width: 600px; 
            margin: 50px auto; 
        }

        /* Smooth CSS Marquee */
        .marquee-container { 
            background-color: #000000; 
            color: #00ff00; 
            padding: 5px; 
            margin-bottom: 20px; 
            border: 1px inset #ffffff;
            overflow: hidden;
            width: 100%;
            box-sizing: border-box;
        }

        .marquee-content {
            display: inline-block;
            white-space: nowrap;
            animation: scroll-left 15s linear infinite;
        }

        @keyframes scroll-left {
            0%   { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        /* Easter Egg perfectly aligned to the outer edge */
        #easter-egg {
            position: absolute;
            top: 0;
            left: 0;
            margin: 0;
            width: 24px;
            height: 24px;
            line-height: 24px;
            text-align: center;
            cursor: pointer;
            text-decoration: underline;
            color: #ffff00;
            font-weight: bold;
            font-size: 18px;
            white-space: nowrap;
            animation: moveAround 10s linear infinite;
            z-index: 9999; /* Keeps the 0 above the main box and marquee */
        }

                @keyframes moveAround {
            0%   { top: 0; left: 0; }
            25%  { top: 0; left: calc(100vw - 24px); }
            50%  { top: calc(100dvh - 24px); left: calc(100vw - 24px); }
            75%  { top: calc(100dvh - 24px); left: 0; }
            100% { top: 0; left: 0; }
        }

        
        #game-canvas { background: #000; display: block; margin: 20px auto; border: 2px inset #fff; }
    </style>
</head>
<body>

    <main>
        <div class="marquee-container">
            <div class="marquee-content">System Online... Aldo López... Staff Software Engineer...</div>
        </div>

        <h1>Aldo López</h1>
        <p>Building things, one byte at a time.</p>
        
        <ul>
            <li><a href="https://github.com/aldolopez" target="_blank">GitHub</a></li>
            <li><a href="https://linkedin.com/in/aldolopez" target="_blank">LinkedIn</a></li>
        </ul>

        <div id="game-wrapper"></div>
        <hr>
        <p><small>Site constructed with pure HTML5/JS.</small></p>
    </main>

    <p id="easter-egg">0</p>

    <script>
        document.getElementById('easter-egg').addEventListener('click', function() {
            if (document.getElementById('game-canvas')) return;

            const wrapper = document.getElementById('game-wrapper');
            const canvas = document.createElement('canvas');
            canvas.id = 'game-canvas';
            canvas.width = 400;
            canvas.height = 300;
            wrapper.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            let playerX = 180;
            
            function draw() {
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#0f0';
                ctx.fillRect(playerX, 270, 20, 20);
                requestAnimationFrame(draw);
            }

            window.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft' && playerX > 0) playerX -= 10;
                if (e.key === 'ArrowRight' && playerX < 380) playerX += 10;
            });

            draw();
        });
    </script>
</body>
</html>
